<!DOCTYPE html>
<html>
<head>
  <title>Employee Tracking</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 30px; }
    input, button { padding: 10px; margin: 10px; width: 250px; }
    button { background: green; color: white; border: none; }
  </style>
</head>
<body>

<h2>Employee Tracking System</h2>

<input type="text" id="name" placeholder="Employee Name"><br>
<input type="text" id="remarks" placeholder="Remarks"><br>

<button onclick="uploadImage()">Upload Image</button>

<p id="status"></p>

<!-- Filestack CDN -->
<script src="https://static.filestackapi.com/filestack-js/3.x.x/filestack.min.js"></script>

<script>
const client = filestack.init("A2VXy8g3bRpe8sFbMAoVVz"); // your API key

function uploadImage() {
  const name = document.getElementById("name").value;
  const remarks = document.getElementById("remarks").value;

  if (!name) {
    alert("Enter name");
    return;
  }

  client.picker({
    accept: ['image/*'],
    maxSize: 2 * 1024 * 1024,
    onUploadDone: function(res) {

      const imageUrl = res.filesUploaded[0].url;

      const data = {
        name: name,
        remarks: remarks,
        image: imageUrl,
        time: new Date().toLocaleString()
      };

      let records = JSON.parse(localStorage.getItem("employees")) || [];
      records.push(data);
      localStorage.setItem("employees", JSON.stringify(records));

      document.getElementById("status").innerText = "Uploaded Successfully!";
    }
  }).open();
}
</script>

</body>
</html>
