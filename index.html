<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Check-In Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0a0b10;--surface:#13151c;--surface2:#1c1f2a;
      --border:rgba(255,255,255,0.08);--accent:#e8ff47;
      --accent-dim:rgba(232,255,71,0.12);--green:#22c55e;
      --text:#f8f9fa;--muted:#8b949e;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;overflow-x:hidden}
    
    .card{background:var(--surface);border:1px solid var(--border);border-radius:28px;width:100%;max-width:440px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.5)}
    .card-header{padding:36px 32px 10px;text-align:center}
    .header-tag{display:inline-flex;align-items:center;gap:6px;background:var(--accent-dim);border:1px solid rgba(232,255,71,0.3);color:var(--accent);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border-radius:100px;margin-bottom:16px}
    .card-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;line-height:1;margin-bottom:8px}
    .card-title span{color:var(--accent)}
    
    .card-body{padding:24px 32px 36px}
    .field{margin-bottom:22px}
    label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:10px;letter-spacing:1px}
    input[type="text"]{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:15px;border-radius:14px;outline:none;font-family:inherit;transition:all 0.2s}
    input[type="text"]:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-dim)}
    
    .photo-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .opt-pill{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:14px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;transition:0.2s}
    .opt-pill:hover{background:var(--accent);color:#000}
    
    .preview-wrap{display:none;margin-top:10px;border-radius:14px;overflow:hidden;border:2px solid var(--green);position:relative}
    .preview-wrap.active{display:block}
    #preview-img{width:100%;height:220px;object-fit:cover;display:block}
    
    .submit-btn{width:100%;background:var(--accent);color:#000;border:none;padding:18px;border-radius:16px;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;cursor:pointer;margin-top:10px;transition:0.2s}
    .submit-btn:active{transform:scale(0.98)}
    .submit-btn:disabled{opacity:0.4;cursor:not-allowed}
    
    #status{margin-top:18px;text-align:center;font-size:13px;font-weight:500}
    .success{color:var(--green)}
    .error{color:#ff4b5c}

    /* Camera Modal */
    #cam-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1000;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    #cam-modal.active{display:flex}
    #video{width:100%;max-width:400px;border-radius:24px;background:#000;transform:scaleX(1)}
    #video.mirrored{transform:scaleX(-1)} /* Only mirror front cam */
    .cam-btns{margin-top:24px;display:flex;align-items:center;gap:20px}
    .shutter{width:70px;height:70px;background:#fff;border-radius:50%;border:6px solid rgba(255,255,255,0.3);cursor:pointer;transition:0.1s}
    .shutter:active{transform:scale(0.9)}
    .flip-btn{background:var(--surface2);border:1px solid var(--border);color:#fff;width:50px;height:50px;border-radius:50%;cursor:pointer}
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="header-tag">Official Check-In</div>
    <h1 class="card-title">IMT Sanity <span>Snapshot</span></h1>
  </div>
  <div class="card-body">
    <div class="field">
      <label>Employee Name</label>
      <input type="text" id="name" placeholder="e.g. Ramjan" autocomplete="off">
    </div>
    <div class="field">
      <label>Location</label>
      <input type="text" id="remarks" placeholder="Location or Aisle">
    </div>
    <div class="field">
      <label>Photo Verification</label>
      <div class="photo-options">
        <button class="opt-pill" onclick="openCam()">📷 Use Camera</button>
        <button class="opt-pill" onclick="document.getElementById('file-input').click()">🖼 Upload</button>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(event)">
      <div class="preview-wrap" id="preview-wrap">
        <img id="preview-img">
      </div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitRecord()">🚀 SUBMIT RECORD</button>
    <div id="status"></div>
  </div>
</div>

<div id="cam-modal">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none"></canvas>
  <div class="cam-btns">
    <button class="opt-pill" onclick="closeCam()">✕ Close</button>
    <div class="shutter" onclick="takeSnap()"></div>
    <button class="flip-btn" onclick="switchCam()">🔄</button>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNIyodplrOGG44dfZDPktNV5qLJ_vyhFsBF5U4l9x3A0SS_0vnA5ImdbXMtqbNCukd/exec";
  let capturedImage = "";
  let stream = null;
  let currentMode = "environment"; // Start with BACK camera

  async function openCam() {
    document.getElementById('cam-modal').classList.add('active');
    startStream();
  }

  async function startStream() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    
    const constraints = {
      video: { 
        facingMode: currentMode,
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    };

    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      const v = document.getElementById('video');
      v.srcObject = stream;
      // Mirror front cam, don't mirror back cam
      v.className = currentMode === "user" ? "mirrored" : "";
    } catch (e) {
      // Fallback if specific mode fails
      stream = await navigator.mediaDevices.getUserMedia({ video: true });
      document.getElementById('video').srcObject = stream;
    }
  }

  function switchCam() {
    currentMode = (currentMode === "user") ? "environment" : "user";
    startStream();
  }

  function closeCam() {
    document.getElementById('cam-modal').classList.remove('active');
    if(stream) stream.getTracks().forEach(t => t.stop());
  }

  function takeSnap() {
    const v = document.getElementById('video'), c = document.getElementById('canvas');
    c.width = 1280; c.height = 720; // Standard resolution
    c.getContext('2d').drawImage(v, 0, 0, 1280, 720);
    capturedImage = c.toDataURL("image/jpeg", 0.9);
    document.getElementById('preview-img').src = capturedImage;
    document.getElementById('preview-wrap').classList.add('active');
    closeCam();
  }

  function handleFile(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      capturedImage = ev.target.result;
      document.getElementById('preview-img').src = capturedImage;
      document.getElementById('preview-wrap').classList.add('active');
    };
    reader.readAsDataURL(e.target.files[0]);
  }

  async function submitRecord() {
    const name = document.getElementById('name').value.trim();
    const remarks = document.getElementById('remarks').value.trim();
    const st = document.getElementById('status'), btn = document.getElementById('submit-btn');

    if (!name || !capturedImage) {
      st.className = "error";
      st.textContent = "⚠️ Please enter your name and take a photo.";
      return;
    }

    btn.disabled = true; 
    st.className = "";
    st.textContent = "⏳ Syncing with Google Sheets...";

    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, remarks, image: capturedImage })
      });

      st.className = "success";
      st.textContent = "✅ CHECK-IN SUCCESSFUL!";
      // Clear form
      document.getElementById('name').value = "";
      document.getElementById('remarks').value = "";
      document.getElementById('preview-wrap').classList.remove('active');
      capturedImage = "";
    } catch (e) {
      st.className = "error";
      st.textContent = "❌ Network Error. Try again.";
    } finally {
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
