<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Tracking</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0a0b0f;--surface:#12141a;--surface2:#1c1f28;
      --border:rgba(255,255,255,0.07);--accent:#e8ff47;
      --accent-dim:rgba(232,255,71,0.10);--green:#22c55e;
      --text:#f0f0f0;--muted:#6b7280;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:24px;width:100%;max-width:480px;overflow:hidden;position:relative;z-index:1}
    .card-header{padding:32px 32px 20px}
    .header-tag{display:inline-flex;align-items:center;gap:6px;background:var(--accent-dim);border:1px solid rgba(232,255,71,0.2);color:var(--accent);font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;padding:5px 12px;border-radius:100px;margin-bottom:16px}
    .card-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1.1;margin-bottom:6px}
    .card-title span{color:var(--accent)}
    .card-body{padding:0 32px 32px}
    .field{margin-bottom:18px}
    label{display:block;font-size:11px;font-weight:500;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    input[type="text"]{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:13px;border-radius:10px;outline:none;font-family:inherit}
    input[type="text"]:focus{border-color:var(--accent)}
    .photo-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .opt-pill{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:10px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:12px}
    .preview-wrap{display:none;margin-top:10px;border-radius:12px;overflow:hidden;border:2px solid var(--green)}
    .preview-wrap.active{display:block}
    #preview-img{width:100%;height:200px;object-fit:cover}
    .submit-btn{width:100%;background:var(--accent);color:#000;border:none;padding:16px;border-radius:12px;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;cursor:pointer;margin-top:20px}
    .submit-btn:disabled{opacity:0.5;cursor:not-allowed}
    #status{margin-top:15px;text-align:center;font-size:13px}
    .success{color:var(--green)}
    .error{color:#ff4757}
    #cam-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;flex-direction:column;align-items:center;justify-content:center}
    #cam-modal.active{display:flex}
    video{width:90%;max-width:400px;border-radius:15px;background:#000}
    .cam-btns{margin-top:20px;display:flex;gap:20px}
    .shutter{width:60px;height:60px;background:#fff;border-radius:50%;border:5px solid #333;cursor:pointer}
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="header-tag">Live Portal</div>
    <h1 class="card-title">Check-In <span>Now</span></h1>
  </div>
  <div class="card-body">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Enter your name">
    </div>
    <div class="field">
      <label>Remarks</label>
      <input type="text" id="remarks" placeholder="Optional notes">
    </div>
    <div class="field">
      <label>Photo</label>
      <div class="photo-options">
        <button class="opt-pill" onclick="openCam()">📷 Camera</button>
        <button class="opt-pill" onclick="document.getElementById('file-input').click()">🖼 Upload</button>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(event)">
      <div class="preview-wrap" id="preview-wrap">
        <img id="preview-img">
      </div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitRecord()">✅ Submit to Google</button>
    <div id="status"></div>
  </div>
</div>

<div id="cam-modal">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none"></canvas>
  <div class="cam-btns">
    <button class="opt-pill" onclick="closeCam()">Cancel</button>
    <div class="shutter" onclick="takeSnap()"></div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgS0X_9vFdhQR7mG2Tr3LIqpel0dnTXd-tfR0VRRcf_7h65_q-1Hc1SFueDSTMtcxD/exec";
  let capturedImage = "";
  let stream = null;

  async function openCam() {
    document.getElementById('cam-modal').classList.add('active');
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    document.getElementById('video').srcObject = stream;
  }

  function closeCam() {
    document.getElementById('cam-modal').classList.remove('active');
    if(stream) stream.getTracks().forEach(t => t.stop());
  }

  function takeSnap() {
    const v = document.getElementById('video'), c = document.getElementById('canvas');
    c.width = 400; c.height = 300;
    c.getContext('2d').drawImage(v, 0, 0, 400, 300);
    capturedImage = c.toDataURL("image/jpeg", 0.7);
    document.getElementById('preview-img').src = capturedImage;
    document.getElementById('preview-wrap').classList.add('active');
    closeCam();
  }

  function handleFile(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      capturedImage = ev.target.result;
      document.getElementById('preview-img').src = capturedImage;
      document.getElementById('preview-wrap').classList.add('active');
    };
    reader.readAsDataURL(e.target.files[0]);
  }

  async function submitRecord() {
    const name = document.getElementById('name').value.trim();
    const remarks = document.getElementById('remarks').value.trim();
    const st = document.getElementById('status'), btn = document.getElementById('submit-btn');

    if (!name || !capturedImage) return alert("Please provide Name and Photo");

    btn.disabled = true; st.textContent = "⏳ Uploading... Please wait.";

    try {
      // We use a simple fetch POST
      const response = await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors", // Required for Google Script Web Apps
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, remarks, image: capturedImage })
      });

      // Since we use no-cors, we can't read the response, but we can assume success if no error
      st.className = "success";
      st.textContent = "✅ Success! Check your Google Sheet.";
      document.getElementById('name').value = "";
      document.getElementById('remarks').value = "";
      document.getElementById('preview-wrap').classList.remove('active');
      capturedImage = "";
    } catch (e) {
      st.className = "error";
      st.textContent = "❌ Error: " + e.message;
    } finally {
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
