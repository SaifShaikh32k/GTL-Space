<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Tracking</title>

  <style>
    body {
      font-family: Arial;
      background: #0a0b0f;
      color: white;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #12141a;
      padding: 20px;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #e8ff47;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    video, img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    #status {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Employee Check-In</h2>

  <input type="text" id="name" placeholder="Enter Name"/>
  <input type="text" id="remarks" placeholder="Remarks"/>

  <!-- Camera -->
  <video id="camera" autoplay playsinline style="display:none;"></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <img id="preview" style="display:none;" />

  <button onclick="startCamera()">📷 Open Camera</button>
  <button onclick="capturePhoto()">📸 Capture Photo</button>

  <button onclick="submitRecord()">✅ Submit</button>

  <div id="status"></div>
</div>

<script>
let uploadedImageUrl = "";
let stream = null;

// Start camera
function startCamera() {
  const video = document.getElementById("camera");

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
      stream = s;
      video.srcObject = stream;
      video.style.display = "block";
    })
    .catch(err => {
      alert("Camera not allowed or not available");
      console.error(err);
    });
}

// Capture photo
function capturePhoto() {
  const video = document.getElementById("camera");
  const canvas = document.getElementById("canvas");
  const img = document.getElementById("preview");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  const imageData = canvas.toDataURL("image/png");
  uploadedImageUrl = imageData;

  img.src = imageData;
  img.style.display = "block";

  // Stop camera
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }

  video.style.display = "none";
}

// Submit
function submitRecord() {
  const name = document.getElementById("name").value.trim();
  const remarks = document.getElementById("remarks").value.trim();
  const status = document.getElementById("status");

  if (!name) {
    status.innerText = "Enter name";
    return;
  }

  if (!uploadedImageUrl) {
    status.innerText = "Capture photo first";
    return;
  }

  const data = {
    name,
    remarks,
    image: uploadedImageUrl,
    time: new Date().toLocaleString()
  };

  let records = JSON.parse(localStorage.getItem("employees")) || [];
  records.push(data);
  localStorage.setItem("employees", JSON.stringify(records));

  status.innerText = "✅ Saved successfully";

  // Reset
  document.getElementById("name").value = "";
  document.getElementById("remarks").value = "";
  document.getElementById("preview").style.display = "none";
  uploadedImageUrl = "";
}
</script>

</body>
</html>
