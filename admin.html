<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0a0b0f;--surface:#12141a;--surface2:#1c1f28;
      --border:rgba(255,255,255,0.06);--accent:#e8ff47;
      --text:#f0f0f0;--muted:#6b7280;--green:#22c55e;
    }
    body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);margin:0;padding:0}
    
    /* Auth Gate */
    #auth-gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
    .auth-box{background:var(--surface);padding:40px;border-radius:20px;border:1px solid var(--border);text-align:center;width:320px}
    input[type="password"]{width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);color:#fff;border-radius:10px;margin:20px 0;outline:none;text-align:center;letter-spacing:4px}
    
    /* Main App */
    #app{display:none;padding:20px}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding:10px 20px;border-bottom:1px solid var(--border)}
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:15px;margin-bottom:30px}
    .stat-card{background:var(--surface);padding:20px;border-radius:15px;border:1px solid var(--border)}
    .stat-val{font-family:'Syne';font-size:32px;font-weight:800;color:var(--accent)}
    
    /* Table */
    .table-card{background:var(--surface);border-radius:15px;border:1px solid var(--border);overflow-x:auto}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;padding:15px;background:var(--surface2);font-size:12px;color:var(--muted);text-transform:uppercase}
    td{padding:15px;border-top:1px solid var(--border);font-size:14px}
    .thumb{width:50px;height:40px;object-fit:cover;border-radius:5px;cursor:pointer;border:1px solid var(--border)}
    .btn{background:var(--accent);color:#000;border:none;padding:10px 20px;border-radius:8px;font-weight:700;cursor:pointer}
    
    #loader{text-align:center;padding:50px;color:var(--accent)}
  </style>
</head>
<body>

<div id="auth-gate">
  <div class="auth-box">
    <h2 style="font-family:'Syne'">Admin Login</h2>
    <input type="password" id="pass" placeholder="••••">
    <button class="btn" onclick="login()">Unlock</button>
  </div>
</div>

<div id="app">
  <div class="header">
    <h1 style="font-family:'Syne'">Dashboard <span>Live</span></h1>
    <button class="btn" onclick="location.reload()">🔄 Refresh</button>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div>Total Logs</div><div class="stat-val" id="total-count">0</div></div>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Remarks</th>
          <th>Photo</th>
        </tr>
      </thead>
      <tbody id="data-table">
        </tbody>
    </table>
    <div id="loader">Fetching from Google Sheets...</div>
  </div>
</div>

<script>
  const SCRIPT_URL = "YOUR_SCRIPT_URL_HERE"; // PASTE YOUR URL HERE

  function login() {
    if(document.getElementById('pass').value === "1234") {
      document.getElementById('auth-gate').style.display = "none";
      document.getElementById('app').style.display = "block";
      fetchData();
    } else {
      alert("Wrong password!");
    }
  }

  async function fetchData() {
    try {
      const res = await fetch(SCRIPT_URL);
      const data = await res.json();
      
      document.getElementById('loader').style.display = "none";
      document.getElementById('total-count').textContent = data.length;
      
      const table = document.getElementById('data-table');
      table.innerHTML = data.reverse().map(row => `
        <tr>
          <td>${new Date(row.timestamp).toLocaleDateString()}</td>
          <td>${row.name}</td>
          <td>${row.remarks || '—'}</td>
          <td><a href="${row['photo link']}" target="_blank"><img src="${row['photo link']}" class="thumb"></a></td>
        </tr>
      `).join('');
    } catch (e) {
      document.getElementById('loader').textContent = "Error loading data. Make sure script is deployed as 'Anyone'.";
    }
  }
</script>
</body>
</html>
