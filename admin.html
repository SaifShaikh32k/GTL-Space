<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    img { width: 80px; }
  </style>
</head>
<body>

<h2>Admin Dashboard</h2>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Remarks</th>
      <th>Image</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody id="data"></tbody>
</table>

<script>
const pass = prompt("Enter password:");
if(pass !== "1234"){
  alert("Access Denied");
  window.location.href = "/";
}

const table = document.getElementById("data");
const records = JSON.parse(localStorage.getItem("employees")) || [];

records.reverse().forEach(d => {
  table.innerHTML += `
    <tr>
      <td>${d.name}</td>
      <td>${d.remarks}</td>
      <td><img src="${d.image}" /></td>
      <td>${d.time}</td>
    </tr>
  `;
});
</script>

</body>
</html>
